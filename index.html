<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- إعدادات مظهر التطبيق المستقل للجوال -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <!-- ربط التطبيق بملف الإعدادات والأيقونة -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة التداول الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        /* ضبط السكرول العمودي ومنع ارتداد التحديث */
        html, body {
            font-family: 'Tajawal', sans-serif;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
            overflow-y: auto; /* يسمح بالنزول لأسفل لمشاهدة الصفقات */
            background-color: #0f172a;
            height: 100%;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* إخفاء أسهم حقول الأرقام الافتراضية وإجبار اتجاه الأرقام لليسار */
        input[type="number"] {
            -webkit-appearance: none;
            margin: 0;
            direction: ltr; /* يحل مشكلة الكرسر العكسي */
            text-align: left;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .focus-ring:focus-within {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
        .toggle-dot {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toggle-bg {
            transition: background-color 0.3s ease;
        }
        .tap-active:active {
            opacity: 0.7;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-12 select-none">

    <!-- الواجهة وبنية الحاسبة -->
    <div class="max-w-md mx-auto px-4 pt-6">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-emerald-400 tracking-wide">حاسبة التداول</h1>
            <p class="text-xs text-slate-400 mt-1">إدارة الصفقات والنسب المتقدمة</p>
        </div>

        <!-- بطاقة المبلغ الكلي -->
        <div class="glass-card rounded-2xl p-4 mb-4 focus-ring transition-all duration-300">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium text-slate-400">المبلغ الكلي</span>
                <button id="currencyToggle" class="tap-active bg-slate-800 text-xs font-bold px-3 py-1.5 rounded-lg text-slate-300 border border-slate-700">
                    $ USD
                </button>
            </div>
            <input type="number" id="totalAmount" inputmode="decimal" placeholder="0.00" class="w-full bg-transparent text-2xl font-bold text-slate-100 placeholder-slate-600 focus:outline-none px-1">
            <div id="convertedAmount" class="text-xs text-slate-500 text-right mt-1.5 font-medium">يساوي: 0.00 ر.س</div>
        </div>

        <!-- بطاقة اختيار طريقة الحساب -->
        <div class="glass-card rounded-2xl p-4 mb-4">
            <div class="flex items-center justify-between mb-4">
                <span id="methodLabel" class="text-sm font-medium text-slate-300">نسبة لخصم الصفقة %</span>
                <label class="relative inline-flex items-center cursor-pointer tap-active">
                    <input type="checkbox" id="calcMethodToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all toggle-dot peer-checked:bg-emerald-500 toggle-bg"></div>
                </label>
            </div>

            <!-- حقل إدخال النسبة أو المبلغ المباشر -->
            <div id="inputFieldContainer" class="focus-ring border border-slate-800 bg-slate-900/50 rounded-xl p-3 flex items-center mb-3">
                <span id="inputUnit" class="text-slate-500 font-bold ml-2">%</span>
                <input type="number" id="strategyInput" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-lg font-bold text-slate-200 placeholder-slate-600 focus:outline-none">
            </div>

            <!-- أزرار النسبة السريعة -->
            <div id="quickRatios" class="grid grid-cols-4 gap-2">
                <button class="ratio-btn tap-active bg-slate-800/60 hover:bg-slate-800 py-2 rounded-xl text-xs font-medium text-slate-400 border border-slate-700/50" data-value="1">1%</button>
                <button class="ratio-btn tap-active bg-slate-800/60 hover:bg-slate-800 py-2 rounded-xl text-xs font-medium text-slate-400 border border-slate-700/50" data-value="2">2%</button>
                <button class="ratio-btn tap-active bg-slate-800/60 hover:bg-slate-800 py-2 rounded-xl text-xs font-medium text-slate-400 border border-slate-700/50" data-value="5">5%</button>
                <button class="ratio-btn tap-active bg-slate-800/60 hover:bg-slate-800 py-2 rounded-xl text-xs font-medium text-slate-400 border border-slate-700/50" data-value="10">10%</button>
            </div>
            
            <div id="dealValueOutput" class="text-xs text-emerald-400 mt-2 font-medium hidden">قيمة النسبة (الصفقة): 0.00 $</div>
        </div>

        <!-- خيار أهداف منفصلة للربح والخسارة -->
        <div class="glass-card rounded-2xl p-4 mb-4">
            <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-slate-300">أهداف منفصلة للربح والخسارة</span>
                <label class="relative inline-flex items-center cursor-pointer tap-active">
                    <input type="checkbox" id="advancedTargetsToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all toggle-dot peer-checked:bg-emerald-500 toggle-bg"></div>
                </label>
            </div>

            <!-- الحقول المتقدمة المنبثقة -->
            <div id="advancedFields" class="mt-4 pt-3 border-t border-slate-800/60 hidden space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-emerald-400 font-medium block mb-1">نسبة هدف الربح</label>
                        <div class="focus-ring bg-slate-900/50 border border-slate-800 rounded-xl p-2.5 flex items-center">
                            <span class="text-slate-600 text-xs font-bold ml-1">%</span>
                            <input type="number" id="profitTargetInput" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-sm font-bold text-slate-200 focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-rose-400 font-medium block mb-1">نسبة وقف الخسارة</label>
                        <div class="focus-ring bg-slate-900/50 border border-slate-800 rounded-xl p-2.5 flex items-center">
                            <span class="text-slate-600 text-xs font-bold ml-1">%</span>
                            <input type="number" id="lossTargetInput" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-sm font-bold text-slate-200 focus:outline-none">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- بطاقة النتائج المباشرة -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="glass-card rounded-2xl p-4 text-center border-l-2 border-emerald-500/50">
                <span class="text-xs font-medium text-slate-400 block mb-1">الربح (من النسبة) (+)</span>
                <div id="profitOutput" class="text-xl font-bold text-emerald-400">0.00</div>
            </div>
            <div class="glass-card rounded-2xl p-4 text-center border-l-2 border-rose-500/50">
                <span class="text-xs font-medium text-slate-400 block mb-1">الخسارة (من النسبة) (-)</span>
                <div id="lossOutput" class="text-xl font-bold text-rose-400">0.00</div>
            </div>
        </div>

        <!-- زر حفظ الحسبة الحالي في السجل -->
        <button id="saveSessionBtn" class="tap-active w-full bg-slate-800/40 hover:bg-slate-800 border border-slate-700/60 text-slate-300 font-medium py-3 rounded-2xl text-sm flex items-center justify-center gap-2 mb-6">
            <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            حفظ الحسبة الحالية في سجل الجلسة
        </button>

        <!-- سجل صفقات الجلسة المؤقت -->
        <div class="glass-card rounded-2xl p-4 mb-8">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-1.5 text-sm font-bold text-slate-300">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    سجل صفقات الجلسة المؤقت
                </div>
                <button id="clearLogBtn" class="text-xs font-bold text-rose-400 tap-active px-2 py-1 rounded hover:bg-rose-500/10">مسح السجل</button>
            </div>
            <div id="logContainer" class="space-y-2 pr-1 text-xs">
                <!-- صفقات مضافة برمجياً تظهر هنا -->
            </div>
        </div>
    </div>

    <!-- كود التشغيل والحساب الذكي والتخزين الدائم -->
    <script>
        let isUSD = true;
        const exchangeRate = 3.75;

        const totalAmountInput = document.getElementById('totalAmount');
        const strategyInput = document.getElementById('strategyInput');
        const profitTargetInput = document.getElementById('profitTargetInput');
        const lossTargetInput = document.getElementById('lossTargetInput');
        
        const currencyToggle = document.getElementById('currencyToggle');
        const calcMethodToggle = document.getElementById('calcMethodToggle');
        const advancedTargetsToggle = document.getElementById('advancedTargetsToggle');
        
        const convertedAmount = document.getElementById('convertedAmount');
        const methodLabel = document.getElementById('methodLabel');
        const inputUnit = document.getElementById('inputUnit');
        const dealValueOutput = document.getElementById('dealValueOutput');
        
        const profitOutput = document.getElementById('profitOutput');
        const lossOutput = document.getElementById('lossOutput');
        
        const advancedFields = document.getElementById('advancedFields');
        const saveSessionBtn = document.getElementById('saveSessionBtn');
        const logContainer = document.getElementById('logContainer');
        const clearLogBtn = document.getElementById('clearLogBtn');

        // محرك الحسابات الذكي الرئيسي
        function calculate() {
            const total = parseFloat(totalAmountInput.value) || 0;
            const inputVal = parseFloat(strategyInput.value) || 0;
            
            // تحويل العملة المعروضة تحت الحقل
            if (isUSD) {
                convertedAmount.innerText = `يساوي: ${(total * exchangeRate).toFixed(2)} ر.س`;
            } else {
                convertedAmount.innerText = `يساوي: ${(total / exchangeRate).toFixed(2)} $`;
            }

            let dealValue = 0;
            const isPercentageMethod = !calcMethodToggle.checked;

            if (isPercentageMethod) {
                dealValue = total * (inputVal / 100);
                dealValueOutput.innerText = `قيمة النسبة (الصفقة): ${dealValue.toFixed(2)} ${isUSD ? '$' : 'ر.س'}`;
                dealValueOutput.classList.remove('hidden');
            } else {
                dealValue = inputVal;
                dealValueOutput.classList.add('hidden');
            }

            let finalProfit = 0;
            let finalLoss = 0;

            if (advancedTargetsToggle.checked) {
                const pTarget = parseFloat(profitTargetInput.value) || 0;
                const lTarget = parseFloat(lossTargetInput.value) || 0;
                finalProfit = dealValue * (pTarget / 100);
                finalLoss = dealValue * (lTarget / 100);
            } else {
                finalProfit = dealValue;
                finalLoss = dealValue;
            }

            // عرض النتائج النهائية بشكل منسق مع رمز العملة
            const unit = isUSD ? '$' : 'ر.س';
            profitOutput.innerText = `${finalProfit.toFixed(2)} ${unit}`;
            lossOutput.innerText = `${finalLoss.toFixed(2)} ${unit}`;
        }

        // استرجاع السجل المحفوظ تلقائياً عند فتح التطبيق
        function loadSavedLog() {
            const savedData = localStorage.getItem('trading_sessions');
            if (savedData) {
                logContainer.innerHTML = savedData;
            } else {
                logContainer.innerHTML = `<div class="text-center text-slate-600 py-4 font-medium" id="emptyLogMsg">لا توجد صفقات مسجلة حالياً في هذه الجلسة</div>`;
            }
        }

        // حفظ السجل الحالي في الذاكرة المحلية
        function saveLogToStorage() {
            localStorage.setItem('trading_sessions', logContainer.innerHTML);
        }

        // تبديل العملات
        currencyToggle.addEventListener('click', () => {
            isUSD = !isUSD;
            currencyToggle.innerText = isUSD ? '$ USD' : 'ر.س SAR';
            if (calcMethodToggle.checked) {
                inputUnit.innerText = isUSD ? "$" : "ر.س";
            }
            calculate();
        });

        // تغيير طريقة الحساب (نسبة مئوية أو مبلغ ثابت)
        calcMethodToggle.addEventListener('change', () => {
            if (calcMethodToggle.checked) {
                methodLabel.innerText = "مبلغ ثابت مخصص للمخاطرة";
                inputUnit.innerText = isUSD ? "$" : "ر.س";
                strategyInput.placeholder = "0.00";
                document.getElementById('quickRatios').classList.add('hidden');
            } else {
                methodLabel.innerText = "نسبة لخصم الصفقة %";
                inputUnit.innerText = "%";
                strategyInput.placeholder = "0";
                document.getElementById('quickRatios').classList.remove('hidden');
            }
            strategyInput.value = '';
            calculate();
        });

        // تفعيل الأهداف المنفصلة
        advancedTargetsToggle.addEventListener('change', () => {
            if (advancedTargetsToggle.checked) {
                advancedFields.classList.remove('hidden');
            } else {
                advancedFields.classList.add('hidden');
            }
            calculate();
        });

        // أزرار النسب السريعة
        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                strategyInput.value = btn.getAttribute('data-value');
                calculate();
            });
        });

        // مستمعي الأحداث للمدخلات
        [totalAmountInput, strategyInput, profitTargetInput, lossTargetInput].forEach(input => {
            input.addEventListener('input', calculate);
        });

        // زر إضافة الصفقة الحالية للسجل الدائم
        saveSessionBtn.addEventListener('click', () => {
            const total = parseFloat(totalAmountInput.value) || 0;
            if (total === 0) return;

            const emptyMsg = document.getElementById('emptyLogMsg');
            if (emptyMsg) emptyMsg.remove();

            const unit = isUSD ? '$' : 'ر.س';
            const isPercentageMethod = !calcMethodToggle.checked;
            const inputVal = strategyInput.value || '0';

            let typeLabel = isPercentageMethod ? `نسبة (${inputVal}%)` : `مبلغ ثابت`;
            
            const logItem = document.createElement('div');
            logItem.className = "bg-slate-900/40 border border-slate-800 rounded-xl p-3 flex flex-col gap-1 text-slate-300 mb-2";
            
            logItem.innerHTML = `
                <div class="flex justify-between font-bold text-slate-400">
                    <span>مبلغ: ${total} ${unit}</span>
                    <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400">نوع: ${typeLabel}</span>
                </div>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-emerald-400 font-semibold">ربح: ${profitOutput.innerText}</span>
                    <span class="text-rose-400 font-semibold">خسارة: ${lossOutput.innerText}</span>
                </div>
            `;
            
            logContainer.insertBefore(logItem, logContainer.firstChild);
            saveLogToStorage(); // حفظ في الـ LocalStorage فوراً
        }); // <-- هنا كان القوس الناقص اللي عطل الدنيا!

        // زر مسح السجل
        clearLogBtn.addEventListener('click', () => {
            logContainer.innerHTML = `<div class="text-center text-slate-600 py-4 font-medium" id="emptyLogMsg">لا توجد صفقات مسجلة حالياً في هذه الجلسة</div>`;
            localStorage.removeItem('trading_sessions');
        });

        // التشغيل الأولي
        loadSavedLog();
    </script>
</body>
</html>
